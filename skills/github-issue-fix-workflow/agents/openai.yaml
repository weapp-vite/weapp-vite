interface:
  display_name: GitHub Issue Fix Workflow
  short_description: GitHub issue 修复闭环：worktree、复现、根因、回归与 PR
  default_prompt: >-
    当任务主轴是在采用 weapp-vite monorepo 布局的仓库中修复 GitHub issue、
    在 `e2e-apps/github-issues` 建立复现，或把修复推进到隔离 worktree、回归覆盖、
    changeset 与 PR 交付时，使用 $github-issue-fix-workflow。始终先创建可写目录内的
    worktree，先稳定复现再改源码，再补 unit/e2e 与必要的文档、skills、AI 入口同步。

policy:
  allow_implicit_invocation: true
