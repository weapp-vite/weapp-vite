interface:
  display_name: Release And Changeset Best Practices
  short_description: changeset、issue worktree、回归验证和发布交付闭环
  default_prompt: >-
    当任务主轴是 changeset、版本联动、GitHub issue worktree、最小复现、回归验证或 PR 交付时，
    使用 $release-and-changeset-best-practices。先判断用户可见性，再给出中文 changeset、测试和提交策略。

policy:
  allow_implicit_invocation: true
