interface:
  display_name: Release And Changeset Best Practices
  short_description: changeset、create-weapp-vite 联动、Conventional Commits 与发布检查
  default_prompt: >-
    Use $release-and-changeset-best-practices whenever the task is to decide
    whether a change needs a changeset, prepare release notes, keep
    create-weapp-vite in sync with weapp-vite/wevu/templates, or follow the
    monorepo's commit-and-release rules. Require Chinese changeset summaries,
    Conventional Commits, and default commit-only delivery unless the task is a
    GitHub issue PR workflow.

policy:
  allow_implicit_invocation: true
