interface:
  display_name: Release And Changeset Best Practices
  short_description: changeset、create-weapp-vite 联动、Conventional Commits 与发布检查
  default_prompt: >-
    当任务是判断某次改动是否需要 changeset、准备 release notes、保持
    create-weapp-vite 与 weapp-vite/wevu/templates 联动，或遵循仓库的
    提交与发布规则时，使用 $release-and-changeset-best-practices。要求
    changeset summary 使用中文，提交遵循 Conventional Commits，并遵循仓库
    的默认交付策略；若任务属于 GitHub issue PR 工作流，则按 PR 例外规则处理。

policy:
  allow_implicit_invocation: true
