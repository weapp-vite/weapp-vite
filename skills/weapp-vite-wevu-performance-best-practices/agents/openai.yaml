interface:
  display_name: Weapp-vite Wevu Performance
  short_description: '`weapp-vite + wevu` 性能诊断与调优：setData、渲染、切页、内存'
  default_prompt: >-
    当任务主轴是小程序性能问题，如卡顿、掉帧、切页慢、白屏、内存告警，或需要在
    `weapp-vite + wevu` 项目里制定系统化性能方案、在截图验收前先稳定性能链路时，
    使用 $weapp-vite-wevu-performance-best-practices。先按 `setData`、render、
    navigation、resource、memory 分类，再结合 `weapp.wevu.preset`、
    `autoSetDataPick` 与页面切换窗口期提出可测量、可回滚的最小改动。

policy:
  allow_implicit_invocation: true
