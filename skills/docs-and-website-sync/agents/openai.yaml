interface:
  display_name: Docs And Website Sync
  short_description: 根据仓库真实代码能力同步 website、skills、AI 指南与生成资产
  default_prompt: >-
    Use $docs-and-website-sync whenever the user asks to sync docs/website/skills
    with current code, refresh AI collaboration pages, update package docs after
    capability changes, or fix stale documentation in the weapp-vite monorepo.
    Always inspect real source/package scripts first, then update affected entry
    pages, skill lists, and regression checklists before regenerating
    llms/SEO assets. If the task is mainly architecture/build design, switch to
    $weapp-vite-best-practices; if mainly runtime semantics, use
    $wevu-best-practices; if mainly performance, use
    $weapp-vite-wevu-performance-best-practices.

policy:
  allow_implicit_invocation: true
