interface:
  display_name: Docs And Website Sync
  short_description: 同步 website、skills、AI 指南、dist/docs 与生成资产
  default_prompt: >-
    当用户要求同步 docs/website/skills 与当前代码、刷新 AI 协作页面、重写技能总结、
    补 `wv` / `dist/docs` / `AGENTS.md` / screenshot / ide logs / MCP 等能力文档，
    或修复采用 weapp-vite monorepo 布局仓库中的过期入口页时，使用
    $docs-and-website-sync。始终先检查真实源码、CLI 与生成脚本，再更新 website、
    skills、README、packaged docs 与生成资产。

policy:
  allow_implicit_invocation: true
