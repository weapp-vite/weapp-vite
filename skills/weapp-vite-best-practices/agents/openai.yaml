interface:
  display_name: Weapp-vite Best Practices
  short_description: weapp-vite 工程化、CLI、dist/docs、分包与构建调优
  default_prompt: >-
    当任务主轴是 weapp-vite 项目的工程架构、CLI 使用、`wv`/`weapp-vite`
    命令、`dist/docs` 随包文档、`vite.config.ts` 的 `weapp` 配置、分包/chunk/
    autoRoutes/autoImport/layout、MCP/Web runtime/lib mode、或下游 app/template
    验证策略时，使用 $weapp-vite-best-practices。优先读取本地
    `node_modules/weapp-vite/dist/docs/`，必要时先重建被修改的包，再做窄范围验证。
    若主轴是 `.vue` SFC 宏与模板语法，切换到
    $weapp-vite-vue-sfc-best-practices；若主轴是 wevu runtime，使用
    $wevu-best-practices；若主轴是原生迁移，使用
    $native-to-weapp-vite-wevu-migration。

policy:
  allow_implicit_invocation: true
