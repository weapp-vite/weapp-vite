interface:
  display_name: Weapp-vite Best Practices
  short_description: 配置、CLI、HMR、插件、分包、Web runtime 与 native AST 性能治理
  default_prompt: >-
    当任务主轴是 weapp-vite 工程配置、CLI 透传、自动路由、分包、插件、stateful HMR、
    Web runtime、lib mode、worker 或 native AST 性能时，使用
    $weapp-vite-best-practices。先读取根 AGENTS.md 与本地 node_modules/weapp-vite/dist/docs/，
    再给出诊断、最小改动和验证命令。若主轴转为 SFC、wevu runtime、迁移或文档同步，切换对应 skill。

policy:
  allow_implicit_invocation: true
