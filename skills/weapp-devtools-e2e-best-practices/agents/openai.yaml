interface:
  display_name: Weapp DevTools E2E Best Practices
  short_description: WeChat DevTools runtime e2e、automator 复用和截图日志验收
  default_prompt: >-
    当任务主轴是 e2e/ide、miniprogram-automator、真实 DevTools runtime、截图、日志或 MCP 页面验收时，
    使用 $weapp-devtools-e2e-best-practices。先检查环境、残留进程和 suite 结构，再复用 automator 并用 reLaunch 串场景。

policy:
  allow_implicit_invocation: true
