interface:
  display_name: Weapp IDE CLI Best Practices
  short_description: weapp-ide-cli 命令治理、自动化分发、i18n 与配置持久化实践
  default_prompt: >-
    当任务涉及 weapp-ide-cli 的命令设计、命令目录导出、automator/config 功能、
    语言切换，或采用 weapp-vite 的仓库中的跨 CLI 分发契约时，使用
    $weapp-ide-cli-best-practices。保持命令归属可判定：先命中原生命令表，
    再做基于 catalog 的透传。输出具体文件级改动、测试和文档同步项。

policy:
  allow_implicit_invocation: true
