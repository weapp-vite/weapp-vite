interface:
  display_name: Weapp IDE CLI Best Practices
  short_description: weapp-ide-cli 命令治理、截图对比、automator 与透传契约
  default_prompt: >-
    当任务主轴是 `weapp-ide-cli` 的命令设计、`preview/upload/open/login`、
    `screenshot` / `compare` / `ide logs`、automator、config doctor/export/import、
    i18n 配置持久化，或 `weapp-vite` 与 `weapp-ide-cli` 的命令透传边界时，使用
    $weapp-ide-cli-best-practices。保持单一命令目录 source-of-truth，先命中原生命令，
    再做基于 catalog 的透传。

policy:
  allow_implicit_invocation: true
