interface:
  display_name: Vue SFC Best Practices
  short_description: weapp-vite Vue SFC 宏、definePageMeta、v-model 与模板兼容
  default_prompt: >-
    当任务主轴是编写或重构小程序 `.vue` 文件、JSON 宏、`definePageMeta`/layout、
    `defineModel`、`usingComponents`、模板指令兼容性或 SFC 编译/运行时排障时，
    使用 $weapp-vite-vue-sfc-best-practices。优先采用 `<script setup lang="ts">`
    和宏约定，并结合当前版本的 packaged docs 与项目根 `AGENTS.md`。若主轴是
    wevu runtime，切换到 $wevu-best-practices；若主轴是项目级配置与构建，
    切换到 $weapp-vite-best-practices。

policy:
  allow_implicit_invocation: true
