interface:
  display_name: Wevu Best Practices
  short_description: wevu 生命周期、router、事件契约、store 与模板编写约束
  default_prompt: >-
    当任务主轴是 wevu pages/components/stores 的运行时行为、生命周期注册、
    router、layout、事件契约、`bindModel`、`storeToRefs`、或 AI 在 wevu 模板里
    应如何继续编写业务代码时，使用 $wevu-best-practices。优先保持小程序语义，
    不套用 Vue Web-only 假设。若主轴是 `.vue` 宏或模板编译，使用
    $weapp-vite-vue-sfc-best-practices；若主轴是项目级 weapp-vite 配置与构建，
    使用 $weapp-vite-best-practices。

policy:
  allow_implicit_invocation: true
