interface:
  display_name: Native Migration Guide
  short_description: '原生小程序迁移到 weapp-vite + wevu 的波次化工作流'
  default_prompt: >-
    当任务是把原生小程序代码渐进迁移到 `weapp-vite + wevu + Vue SFC` 时，
    使用 $native-to-weapp-vite-wevu-migration。按波次规划，优先保证行为等价，
    把机械迁移与语义升级拆开处理，并同步考虑迁移后 AI 维护入口（如 `AGENTS.md`、
    packaged docs、wevu 编写约束）。

policy:
  allow_implicit_invocation: true
