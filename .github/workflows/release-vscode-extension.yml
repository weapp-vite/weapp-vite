name: Release VSCode Extension

on:
  push:
    branches:
      - main
    paths:
      - 'extensions/vscode/**'
      - .github/workflows/release-vscode-extension.yml
      - '.github/actions/setup-node-pnpm/**'
  workflow_dispatch:
    inputs:
      mode:
        description: Release mode
        required: true
        default: package
        type: choice
        options:
          - package
          - publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release-vscode-extension:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip vscode release]')
    name: VSCode Extension ${{ github.event_name == 'push' && 'Auto Publish' || (inputs.mode == 'publish' && 'Publish' || 'Package') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 20

      - name: Plan release
        id: plan
        env:
          WEAPP_VSCODE_RELEASE_BASE: ${{ github.event_name == 'push' && github.event.before || '' }}
        run: pnpm --dir extensions/vscode run release:plan

      - name: Skip auto publish when no releasable changes exist
        if: github.event_name == 'push' && steps.plan.outputs.should_release != 'true'
        run: echo 'No releasable VS Code extension changes detected.'

      - name: Apply automatic version bump
        if: (github.event_name == 'push' || inputs.mode == 'publish') && steps.plan.outputs.should_release == 'true'
        run: pnpm --dir extensions/vscode run release:apply

      - name: Run publish gate
        if: github.event_name != 'push' || steps.plan.outputs.should_release == 'true' || inputs.mode == 'package'
        run: pnpm --dir extensions/vscode run check:publish

      - name: Package VSIX
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'package'
        run: pnpm --dir extensions/vscode run package:dry-run

      - name: Upload VSIX artifact
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'package'
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension-vsix
          path: extensions/vscode/.artifacts/*.vsix
          if-no-files-found: error

      - name: Publish extension
        if: (github.event_name == 'push' || inputs.mode == 'publish') && steps.plan.outputs.should_release == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm --dir extensions/vscode run publish:vsce

      - name: Commit release metadata
        if: (github.event_name == 'push' || inputs.mode == 'publish') && steps.plan.outputs.should_release == 'true'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add extensions/vscode/package.json extensions/vscode/CHANGELOG.md
          git commit -m "chore(vscode): release ${{ steps.plan.outputs.next_version }} [skip vscode release]"
          git tag "${{ steps.plan.outputs.release_tag }}"

      - name: Push release commit and tag
        if: (github.event_name == 'push' || inputs.mode == 'publish') && steps.plan.outputs.should_release == 'true'
        run: git push origin HEAD:${{ github.ref_name }} --follow-tags
