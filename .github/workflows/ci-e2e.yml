name: CI E2E

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '50 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  miniapp-e2e-ci-pr:
    if: github.event_name != 'schedule'
    name: Miniapp E2E CI (${{ matrix.os }} / Node ${{ matrix.node-version }} / ${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: weapp
            os: ubuntu-latest
            node-version: 20
          - platform: weapp
            os: ubuntu-latest
            node-version: 22
          - platform: weapp
            os: windows-latest
            node-version: 20
          - platform: weapp
            os: macos-latest
            node-version: 20
      max-parallel: 2
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 35
      build_command: pnpm build:pkgs
      main_command: pnpm e2e:ci
      e2e_platform: ${{ matrix.platform }}
      increase_ulimit: true
    secrets: inherit

  miniapp-e2e-ci-full:
    if: github.event_name == 'schedule'
    name: Miniapp E2E CI (${{ matrix.os }} / Node ${{ matrix.node-version }} / ${{ matrix.platform }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - platform: weapp
            os: ubuntu-latest
            node-version: 20
          - platform: weapp
            os: windows-latest
            node-version: 20
          - platform: weapp
            os: macos-latest
            node-version: 20
          - platform: weapp
            os: ubuntu-latest
            node-version: 22
          - platform: weapp
            os: windows-latest
            node-version: 22
          - platform: weapp
            os: macos-latest
            node-version: 22
          - platform: weapp
            os: ubuntu-latest
            node-version: 24
          - platform: weapp
            os: windows-latest
            node-version: 24
          - platform: weapp
            os: macos-latest
            node-version: 24
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 35
      build_command: pnpm build:pkgs
      main_command: pnpm e2e:ci
      e2e_platform: ${{ matrix.platform }}
      increase_ulimit: true
    secrets: inherit

  web-e2e-baseline-pr:
    if: github.event_name != 'schedule'
    name: Web E2E Baseline (Node 20)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '20'
      timeout_minutes: 20
      build_command: pnpm build:pkgs
      main_command: pnpm e2e:web
      install_playwright: true
    secrets: inherit

  web-e2e-baseline-full:
    if: github.event_name == 'schedule'
    name: Web E2E Baseline (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 20
      build_command: pnpm build:pkgs
      main_command: pnpm e2e:web
      install_playwright: true
    secrets: inherit
