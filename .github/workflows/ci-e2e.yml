name: CI E2E

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '50 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  miniapp-e2e-ci-pr:
    if: github.event_name != 'schedule'
    name: Miniapp E2E CI (${{ matrix.os }} / Node ${{ matrix.node-version }} / ${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: weapp
            os: ubuntu-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci
          - platform: weapp
            os: ubuntu-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci
          - platform: weapp
            os: windows-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci:windows
          - platform: weapp
            os: macos-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci:macos
      max-parallel: 2
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 40
      build_command: ${{ matrix.build-command }}
      main_command: pnpm e2e:ci:non-hmr
      e2e_platform: ${{ matrix.platform }}
      increase_ulimit: true
    secrets: inherit

  miniapp-hmr-ci-pr:
    if: github.event_name != 'schedule'
    name: Miniapp HMR Guard (${{ matrix.os }} / Node 22 / weapp)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            build-command: pnpm build:pkgs:ci
          - os: windows-latest
            build-command: pnpm build:pkgs:ci:windows
          - os: macos-latest
            build-command: pnpm build:pkgs:ci:macos
      max-parallel: 3
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '22'
      timeout_minutes: 35
      build_command: ${{ matrix.build-command }}
      main_command: pnpm e2e:ci:hmr
      e2e_platform: weapp
      increase_ulimit: true
    secrets: inherit

  miniapp-e2e-ci-full:
    if: github.event_name == 'schedule'
    name: Miniapp E2E CI (${{ matrix.os }} / Node ${{ matrix.node-version }} / ${{ matrix.platform }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - platform: weapp
            os: ubuntu-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci
          - platform: weapp
            os: windows-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci:windows
          - platform: weapp
            os: macos-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci:macos
          - platform: weapp
            os: ubuntu-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci
          - platform: weapp
            os: windows-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci:windows
          - platform: weapp
            os: macos-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci:macos
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 40
      build_command: ${{ matrix.build-command }}
      main_command: pnpm e2e:ci:non-hmr
      e2e_platform: ${{ matrix.platform }}
      increase_ulimit: true
    secrets: inherit

  miniapp-hmr-ci-full:
    if: github.event_name == 'schedule'
    name: Miniapp HMR Guard (${{ matrix.os }} / Node ${{ matrix.node-version }} / weapp)
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci
          - os: windows-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci:windows
          - os: macos-latest
            node-version: 22
            build-command: pnpm build:pkgs:ci:macos
          - os: ubuntu-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci
          - os: windows-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci:windows
          - os: macos-latest
            node-version: 24
            build-command: pnpm build:pkgs:ci:macos
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 35
      build_command: ${{ matrix.build-command }}
      main_command: pnpm e2e:ci:hmr
      e2e_platform: weapp
      increase_ulimit: true
    secrets: inherit

  web-e2e-baseline-pr:
    if: github.event_name != 'schedule'
    name: Web E2E Baseline (Node 24)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      # DevTools baselines are generated on macOS and depend on its system CJK fonts.
      runs_on: macos-latest
      node_version: '24'
      timeout_minutes: 20
      build_command: pnpm build:pkgs:ci
      main_command: pnpm e2e:web
      install_playwright: true
      artifact_name: web-runtime-visual-pr
      artifact_path: .tmp/web-runtime-visual/**
    secrets: inherit

  workspace-hmr-pr:
    if: github.event_name != 'schedule'
    name: Workspace HMR Changed Projects (Node 24)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '24'
      timeout_minutes: 60
      fetch_depth: 0
      build_command: pnpm build:pkgs:ci
      main_command: pnpm audit:hmr:changed
      increase_ulimit: true
      artifact_name: workspace-hmr-pr
      artifact_path: .tmp/workspace-hmr/**
    secrets: inherit

  workspace-hmr-nightly:
    if: github.event_name == 'schedule'
    name: Workspace HMR Nightly Full (Node 24)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '24'
      timeout_minutes: 120
      fetch_depth: 0
      build_command: pnpm build:pkgs:ci
      main_command: pnpm audit:hmr:nightly
      increase_ulimit: true
      artifact_name: workspace-hmr-nightly
      artifact_path: .tmp/workspace-hmr/**
    secrets: inherit

  web-e2e-baseline-full:
    if: github.event_name == 'schedule'
    name: Web E2E Baseline (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        node-version: [22, 24]
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      # Keep screenshot font rasterization aligned with the DevTools baseline host.
      runs_on: macos-latest
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 20
      build_command: pnpm build:pkgs:ci
      main_command: pnpm e2e:web
      install_playwright: true
      artifact_name: web-runtime-visual-node-${{ matrix.node-version }}
      artifact_path: .tmp/web-runtime-visual/**
    secrets: inherit
