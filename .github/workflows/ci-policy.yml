name: CI Policy

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  policy-pr:
    if: github.event_name != 'schedule'
    name: Policy Checks (Node 24)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '24'
      timeout_minutes: 10
      main_command: |
        pnpm check:changeset:frontmatter
        pnpm check:create-weapp-vite-changeset
        pnpm check:publishable-workspace-dependency-protocols
        pnpm check:weapp-core-constants-changeset
        pnpm check:weapp-core-constants-dependency-range
        pnpm check:rolldown:single-version
        pnpm check:vscode-extension-changeset
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
          pnpm seo:quality:strict -- --git-diff-base "origin/${{ github.base_ref }}"
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          pnpm seo:quality:strict -- --git-diff-base "HEAD~1"
        else
          pnpm seo:quality:strict
        fi
        pnpm audit --audit-level=moderate || true
    secrets: inherit

  policy-full:
    if: github.event_name == 'schedule'
    name: Policy Checks (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        node-version: [22, 24]
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 10
      main_command: |
        pnpm check:changeset:frontmatter
        pnpm check:create-weapp-vite-changeset
        pnpm check:publishable-workspace-dependency-protocols
        pnpm check:weapp-core-constants-changeset
        pnpm check:weapp-core-constants-dependency-range
        pnpm check:rolldown:single-version
        pnpm check:vscode-extension-changeset
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
          pnpm seo:quality:strict -- --git-diff-base "origin/${{ github.base_ref }}"
        elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          pnpm seo:quality:strict -- --git-diff-base "HEAD~1"
        else
          pnpm seo:quality:strict
        fi
        pnpm audit --audit-level=moderate || true
    secrets: inherit
