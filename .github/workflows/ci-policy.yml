name: CI Policy

on:
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  policy-pr:
    if: github.event_name != 'schedule'
    name: Policy Checks (Node 20)
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 20

      - name: Check create-weapp-vite changeset rule
        run: pnpm check:create-weapp-vite-changeset

      - name: SEO quality strict gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
            pnpm seo:quality:strict -- --git-diff-base "origin/${{ github.base_ref }}"
          else
            pnpm seo:quality:strict
          fi

      - name: Security Audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  policy-full:
    if: github.event_name == 'schedule'
    name: Policy Checks (Node ${{ matrix.node-version }})
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: ${{ matrix.node-version }}

      - name: Check create-weapp-vite changeset rule
        run: pnpm check:create-weapp-vite-changeset

      - name: SEO quality strict gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
            pnpm seo:quality:strict -- --git-diff-base "origin/${{ github.base_ref }}"
          else
            pnpm seo:quality:strict
          fi

      - name: Security Audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
