name: CI Policy

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    name: Policy Checks (Node ${{ matrix.node-version }})
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check create-weapp-vite changeset rule
        run: pnpm check:create-weapp-vite-changeset

      - name: SEO quality strict gate
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
            pnpm seo:quality:strict -- --git-diff-base "origin/${{ github.base_ref }}"
          else
            pnpm seo:quality:strict
          fi

      - name: Security Audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
