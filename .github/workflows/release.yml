name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}
env:
  HUSKY: 0

permissions:
  contents: write # to create release (changesets/action)
  issues: write # to post issue comments (changesets/action)
  pull-requests: write # to create pull request (changesets/action)
  id-token: write # to use OpenID Connect token for provenance (changesets/action)

jobs:
  release:
    name: Release
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm i

      - name: Validate changeset frontmatter
        run: pnpm check:changeset:frontmatter

      - name: Validate constants release guards
        run: |
          pnpm check:weapp-core-constants-changeset
          pnpm check:weapp-core-constants-dependency-range

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm publish-packages
        env:
          # this doesn't work but semantic-release works
          # see https://github.com/sonofmagic/npm-lib-rollup-template/blob/main/.github/workflows/release.yml#L46
          # NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          npm_config_registry: https://registry.npmjs.org
          # https://github.com/changesets/changesets/pull/1659
          NPM_CONFIG_PROVENANCE: true

      - name: Plan VS Code Marketplace release
        id: vscode_marketplace
        run: pnpm --dir extensions/vscode run release:marketplace:plan

      - name: Publish VS Code extension to Marketplace
        if: steps.vscode_marketplace.outputs.should_publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm --dir extensions/vscode run publish:vsce

      - name: Tag VS Code Marketplace release
        if: steps.vscode_marketplace.outputs.should_publish == 'true'
        run: |
          git tag "${{ steps.vscode_marketplace.outputs.release_tag }}"
          git push origin "${{ steps.vscode_marketplace.outputs.release_tag }}"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
