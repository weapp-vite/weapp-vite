name: Create Weapp Vite Smoke

on:
  workflow_dispatch:
    inputs:
      package-spec:
        description: npm dist-tag or version for create-weapp-vite
        required: false
        default: latest
        type: string
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: Create Smoke (${{ matrix.os }} / Node ${{ matrix.node-version }})
    timeout-minutes: ${{ github.event_name == 'schedule' && 90 || 30 }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: ${{ github.event_name == 'schedule' && 3 || 1 }}
      matrix:
        include: ${{ fromJSON(github.event_name == 'schedule'
          && '[{"os":"ubuntu-latest","node-version":20},{"os":"windows-latest","node-version":20},{"os":"macos-latest","node-version":20},{"os":"ubuntu-latest","node-version":22},{"os":"windows-latest","node-version":22},{"os":"macos-latest","node-version":22},{"os":"ubuntu-latest","node-version":24},{"os":"windows-latest","node-version":24},{"os":"macos-latest","node-version":24}]'
          || '[{"os":"ubuntu-latest","node-version":22}]') }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Enable Corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Print package manager versions
        shell: bash
        run: |
          print_version() {
            local name="$1"
            shift
            echo "==> ${name}"
            if "$@"; then
              return 0
            fi
            echo "${name} unavailable"
            return 0
          }

          print_version node node -v
          print_version npm npm -v
          print_version pnpm pnpm -v
          print_version yarn yarn -v
          print_version bun bun --version

      - name: Run create-weapp-vite smoke matrix
        env:
          CREATE_WEAPP_VITE_SPEC: ${{ github.event.inputs['package-spec'] || 'latest' }}
          CREATE_WEAPP_VITE_TEMPLATES: ${{ github.event_name == 'schedule' && 'default,lib,wevu,wevu-tdesign,tailwindcss,vant,tdesign' || 'default,wevu,wevu-tdesign' }}
          CREATE_WEAPP_VITE_SCENARIOS: ${{ github.event_name == 'schedule' && 'pnpm,yarn,npm,bun' || 'pnpm,npm' }}
          CREATE_WEAPP_VITE_REPORT_FILE: ${{ runner.temp }}/create-weapp-vite-smoke-report/report.json
          CREATE_WEAPP_VITE_REPORT_OS: ${{ matrix.os }}
          CREATE_WEAPP_VITE_REPORT_NODE: ${{ matrix.node-version }}
        run: node ./scripts/create-weapp-vite-smoke.mjs

      - name: Upload smoke report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: create-weapp-vite-smoke-report-${{ matrix.os }}-node${{ matrix.node-version }}
          path: ${{ runner.temp }}/create-weapp-vite-smoke-report/report.json
          if-no-files-found: warn

  report:
    name: Smoke Report
    if: always()
    needs: [smoke]
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download smoke report artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: create-weapp-vite-smoke-report-*
          path: artifacts/create-weapp-vite-smoke-report
          merge-multiple: false

      - name: Merge smoke reports
        run: node ./scripts/merge-create-weapp-vite-smoke-reports.mjs artifacts/create-weapp-vite-smoke-report artifacts/create-weapp-vite-smoke-report-summary

      - name: Append report to workflow summary
        run: cat artifacts/create-weapp-vite-smoke-report-summary/create-weapp-vite-smoke-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload merged smoke report
        uses: actions/upload-artifact@v4
        with:
          name: create-weapp-vite-smoke-report-summary
          path: artifacts/create-weapp-vite-smoke-report-summary
