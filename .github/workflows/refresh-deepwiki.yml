name: Refresh DeepWiki

on:
  schedule:
    # GitHub cron has no continuous "every 8 days" expression. Run daily and
    # let the public DeepWiki index date enforce the eight-day interval.
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: refresh-deepwiki
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    name: Refresh weapp-vite DeepWiki
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: main

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js environment
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install browser automation dependencies
        run: |
          pnpm install --frozen-lockfile --ignore-scripts
          pnpm exec playwright install --with-deps chromium

      - name: Read current main commit
        run: echo "MAIN_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Refresh DeepWiki when due
        run: node .github/scripts/refresh-deepwiki.mjs
