name: CI

on:
  # push:
  #   branches: ['main']
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '20 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-pr:
    if: github.event_name != 'schedule'
    name: Build and Test (${{ matrix.os }} / Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 20
          - os: ubuntu-latest
            node-version: 22
          - os: windows-latest
            node-version: 20
          - os: macos-latest
            node-version: 20
      max-parallel: 2
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 25
      build_command: pnpm build:pkgs:ci
      main_command: |
        pnpm lint
        pnpm build:ci
        pnpm test:coverage
      upload_codecov: true
    secrets: inherit

  build-full:
    if: github.event_name == 'schedule'
    name: Build and Test (${{ matrix.os }} / Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 25
      build_command: pnpm build:pkgs:ci
      main_command: |
        pnpm lint
        pnpm build:ci
        pnpm test:coverage
      upload_codecov: true
    secrets: inherit

  weapi-compat-pr:
    if: github.event_name != 'schedule'
    name: Weapi Compatibility Guard (Node 20)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '20'
      timeout_minutes: 15
      main_command: |
        pnpm --filter @wevu/api catalog:check
        pnpm --filter @wevu/api docs:check
        pnpm --filter @wevu/api lint
        pnpm --filter @wevu/api typecheck
        pnpm --filter @wevu/api typecheck:test
        pnpm --filter @wevu/api structure:check
        pnpm --filter @wevu/api strict-alias:check
        pnpm --filter @wevu/api coverage:check
        pnpm --filter @wevu/api test
        pnpm --filter @wevu/api test:types
        pnpm --filter @wevu/api report:api
        git diff --exit-code -- \
          packages-runtime/weapi/README.md \
          packages-runtime/weapi/src/core/apiCatalog.ts \
          packages-runtime/weapi/src/core/types.ts \
          packages-runtime/weapi/src/index.ts \
          packages-runtime/weapi/types/index.d.ts \
          packages-runtime/weapi/reports/api-compat
    secrets: inherit

  weapi-compat-full:
    if: github.event_name == 'schedule'
    name: Weapi Compatibility Guard (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        node-version: [20, 22, 24]
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 15
      main_command: |
        pnpm --filter @wevu/api catalog:check
        pnpm --filter @wevu/api docs:check
        pnpm --filter @wevu/api lint
        pnpm --filter @wevu/api typecheck
        pnpm --filter @wevu/api typecheck:test
        pnpm --filter @wevu/api structure:check
        pnpm --filter @wevu/api strict-alias:check
        pnpm --filter @wevu/api coverage:check
        pnpm --filter @wevu/api test
        pnpm --filter @wevu/api test:types
        pnpm --filter @wevu/api report:api
        git diff --exit-code -- \
          packages-runtime/weapi/README.md \
          packages-runtime/weapi/src/core/apiCatalog.ts \
          packages-runtime/weapi/src/core/types.ts \
          packages-runtime/weapi/src/index.ts \
          packages-runtime/weapi/types/index.d.ts \
          packages-runtime/weapi/reports/api-compat
    secrets: inherit
