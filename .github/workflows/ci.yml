name: CI

on:
  # push:
  #   branches: ['main']
  pull_request:
    types: [opened, synchronize]
  schedule:
    - cron: '20 1 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-pr:
    if: github.event_name != 'schedule'
    name: Build and Test (${{ matrix.os }} / Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci
            build_script: build:ci
          - os: ubuntu-latest
            node-version: 24
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci
            build_script: build:ci
          - os: windows-latest
            node-version: 22
            timeout_minutes: 40
            build_pkgs_script: build:pkgs:ci:windows
            build_script: build:ci:windows
          - os: macos-latest
            node-version: 22
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci:macos
            build_script: build:ci:macos
      max-parallel: 2
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: ${{ matrix.timeout_minutes }}
      build_command: pnpm ${{ matrix.build_pkgs_script }}
      main_command: |
        pnpm lint
        pnpm ${{ matrix.build_script }}
        pnpm test:coverage
      upload_codecov: true
    secrets: inherit

  build-full:
    if: github.event_name == 'schedule'
    name: Build and Test (${{ matrix.os }} / Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - os: ubuntu-latest
            node-version: 22
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci
            build_script: build:ci
          - os: ubuntu-latest
            node-version: 24
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci
            build_script: build:ci
          - os: windows-latest
            node-version: 22
            timeout_minutes: 40
            build_pkgs_script: build:pkgs:ci:windows
            build_script: build:ci:windows
          - os: windows-latest
            node-version: 24
            timeout_minutes: 40
            build_pkgs_script: build:pkgs:ci:windows
            build_script: build:ci:windows
          - os: macos-latest
            node-version: 22
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci:macos
            build_script: build:ci:macos
          - os: macos-latest
            node-version: 24
            timeout_minutes: 25
            build_pkgs_script: build:pkgs:ci:macos
            build_script: build:ci:macos
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ${{ matrix.os }}
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 25
      build_command: pnpm ${{ matrix.build_pkgs_script }}
      main_command: |
        pnpm lint
        pnpm ${{ matrix.build_script }}
        pnpm test:coverage
      upload_codecov: true
    secrets: inherit

  weapi-compat-pr:
    if: github.event_name != 'schedule'
    name: Weapi Compatibility Guard (Node 24)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '24'
      timeout_minutes: 15
      main_command: |
        pnpm --filter @wevu/api catalog:check
        pnpm --filter @wevu/api docs:check
        pnpm --filter @wevu/api lint
        pnpm --filter @wevu/api typecheck
        pnpm --filter @wevu/api typecheck:test
        pnpm --filter @wevu/api structure:check
        pnpm --filter @wevu/api strict-alias:check
        pnpm --filter @wevu/api coverage:check
        pnpm --filter @wevu/api test
        pnpm --filter @wevu/api test:types
        pnpm --filter @wevu/api report:api
        git diff --exit-code -- \
          packages-runtime/weapi/README.md \
          packages-runtime/weapi/src/core/apiCatalog.ts \
          packages-runtime/weapi/src/core/types.ts \
          packages-runtime/weapi/src/index.ts \
          packages-runtime/weapi/types/index.d.ts \
          packages-runtime/weapi/reports/api-compat
    secrets: inherit

  weapi-compat-full:
    if: github.event_name == 'schedule'
    name: Weapi Compatibility Guard (Node ${{ matrix.node-version }})
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        node-version: [22, 24]
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '${{ matrix.node-version }}'
      timeout_minutes: 15
      main_command: |
        pnpm --filter @wevu/api catalog:check
        pnpm --filter @wevu/api docs:check
        pnpm --filter @wevu/api lint
        pnpm --filter @wevu/api typecheck
        pnpm --filter @wevu/api typecheck:test
        pnpm --filter @wevu/api structure:check
        pnpm --filter @wevu/api strict-alias:check
        pnpm --filter @wevu/api coverage:check
        pnpm --filter @wevu/api test
        pnpm --filter @wevu/api test:types
        pnpm --filter @wevu/api report:api
        git diff --exit-code -- \
          packages-runtime/weapi/README.md \
          packages-runtime/weapi/src/core/apiCatalog.ts \
          packages-runtime/weapi/src/core/types.ts \
          packages-runtime/weapi/src/index.ts \
          packages-runtime/weapi/types/index.d.ts \
          packages-runtime/weapi/reports/api-compat
    secrets: inherit
