name: CI Performance

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '35 1 * * *'
  workflow_dispatch:
    inputs:
      threshold-percent:
        description: relative regression threshold percent
        required: false
        default: '25'
      min-extra-ms:
        description: minimum absolute regression cost in milliseconds
        required: false
        default: '200'
      iterations:
        description: benchmark iterations per scenario
        required: false
        default: '2'
      scenarios:
        description: comma-separated resolver component counts
        required: false
        default: '1,20,50,100'
      templates-hmr-iterations:
        description: templates HMR iterations per scenario
        required: false
        default: '1'
      templates-build-iterations:
        description: templates build iterations per ref
        required: false
        default: '1'
      templates-hmr-filter:
        description: optional templates HMR template filter
        required: false
      templates-hmr-max-scenarios-per-template:
        description: optional max HMR scenarios per template
        required: false
        default: '6'
      templates-hmr-startup-timeout-ms:
        description: templates HMR dev startup timeout in milliseconds
        required: false
        default: '120000'
      templates-hmr-sample-mode:
        description: templates HMR sample mode, edit-only or best-of-cycle
        required: false
        default: best-of-cycle
      templates-baseline-ref:
        description: templates performance baseline ref for workflow_dispatch
        required: false
        default: main
      templates-head-ref:
        description: templates performance head ref for workflow_dispatch
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  auto-import-performance:
    name: Auto Import Performance (Ubuntu / Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: '24'

      - name: Resolve benchmark inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          FAIL_ON_REGRESSION: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
          INPUT_THRESHOLD_PERCENT: ${{ github.event.inputs['threshold-percent'] || '' }}
          INPUT_MIN_EXTRA_MS: ${{ github.event.inputs['min-extra-ms'] || '' }}
          INPUT_ITERATIONS: ${{ github.event.inputs.iterations || '' }}
          INPUT_SCENARIOS: ${{ github.event.inputs.scenarios || '' }}
          AUTO_IMPORT_BENCH_REPORT_DIR: ${{ runner.temp }}/auto-import-performance-report
        run: |
          export AUTO_IMPORT_BENCH_THRESHOLD_PERCENT="${INPUT_THRESHOLD_PERCENT:-25}"
          export AUTO_IMPORT_BENCH_MIN_EXTRA_MS="${INPUT_MIN_EXTRA_MS:-200}"
          export BENCH_ITERATIONS="${INPUT_ITERATIONS:-2}"
          export BENCH_SCENARIOS="${INPUT_SCENARIOS:-1,20,50,100}"

          {
            echo "AUTO_IMPORT_BENCH_THRESHOLD_PERCENT=${AUTO_IMPORT_BENCH_THRESHOLD_PERCENT}"
            echo "AUTO_IMPORT_BENCH_MIN_EXTRA_MS=${AUTO_IMPORT_BENCH_MIN_EXTRA_MS}"
            echo "AUTO_IMPORT_BENCH_FAIL_ON_REGRESSION=${FAIL_ON_REGRESSION}"
            echo "BENCH_ITERATIONS=${BENCH_ITERATIONS}"
            echo "BENCH_SCENARIOS=${BENCH_SCENARIOS}"
            echo "AUTO_IMPORT_BENCH_REPORT_DIR=${AUTO_IMPORT_BENCH_REPORT_DIR}"
          } >> "$GITHUB_ENV"

          {
            echo "### auto-import benchmark inputs"
            echo "- event: \`${EVENT_NAME}\`"
            echo "- mode: \`${FAIL_ON_REGRESSION}\`"
            echo "- threshold percent: \`${AUTO_IMPORT_BENCH_THRESHOLD_PERCENT}\`"
            echo "- min extra ms: \`${AUTO_IMPORT_BENCH_MIN_EXTRA_MS}\`"
            echo "- iterations: \`${BENCH_ITERATIONS}\`"
            echo "- scenarios: \`${BENCH_SCENARIOS}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run auto-import performance benchmark
        run: pnpm --filter weapp-vite benchmark:auto-import:ci

      - name: Upload performance report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: auto-import-performance-report
          path: ${{ runner.temp }}/auto-import-performance-report
          if-no-files-found: warn

  templates-performance:
    name: Templates Performance (${{ matrix.os }} / Node 24)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Check out head
        uses: actions/checkout@v6
        with:
          path: head
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs['templates-head-ref'] || github.sha }}

      - name: Check out baseline
        uses: actions/checkout@v6
        with:
          path: baseline
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.inputs['templates-baseline-ref'] || github.event.repository.default_branch }}

      - uses: pnpm/action-setup@v5
        with:
          version: 11.6.0

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: head/pnpm-lock.yaml

      - name: Install head dependencies
        shell: bash
        working-directory: head
        run: pnpm install --frozen-lockfile

      - name: Install baseline dependencies
        shell: bash
        working-directory: baseline
        run: pnpm install --frozen-lockfile

      - name: Resolve templates benchmark inputs
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_HMR_ITERATIONS: ${{ github.event.inputs['templates-hmr-iterations'] || '' }}
          INPUT_BUILD_ITERATIONS: ${{ github.event.inputs['templates-build-iterations'] || '' }}
          INPUT_HMR_FILTER: ${{ github.event.inputs['templates-hmr-filter'] || '' }}
          INPUT_MAX_HMR_SCENARIOS_PER_TEMPLATE: ${{ github.event.inputs['templates-hmr-max-scenarios-per-template'] || '' }}
          INPUT_HMR_PROFILE_TIMEOUT_MS: ${{ github.event.inputs['templates-hmr-profile-timeout-ms'] || '' }}
          INPUT_HMR_STARTUP_TIMEOUT_MS: ${{ github.event.inputs['templates-hmr-startup-timeout-ms'] || '' }}
          INPUT_HMR_SAMPLE_MODE: ${{ github.event.inputs['templates-hmr-sample-mode'] || '' }}
          TEMPLATES_PERF_REPORT_DIR: ${{ runner.temp }}/templates-performance-report
        run: |
          export TEMPLATES_PERF_HMR_ITERATIONS="${INPUT_HMR_ITERATIONS:-1}"
          export TEMPLATES_PERF_BUILD_ITERATIONS="${INPUT_BUILD_ITERATIONS:-1}"
          export TEMPLATES_PERF_HMR_FILTER="${INPUT_HMR_FILTER:-}"
          export TEMPLATES_PERF_HMR_MAX_SCENARIOS_PER_TEMPLATE="${INPUT_MAX_HMR_SCENARIOS_PER_TEMPLATE:-6}"
          export TEMPLATES_PERF_HMR_PROFILE_TIMEOUT_MS="${INPUT_HMR_PROFILE_TIMEOUT_MS:-15000}"
          export TEMPLATES_PERF_HMR_STARTUP_TIMEOUT_MS="${INPUT_HMR_STARTUP_TIMEOUT_MS:-120000}"
          export TEMPLATES_PERF_HMR_SAMPLE_MODE="${INPUT_HMR_SAMPLE_MODE:-best-of-cycle}"

          {
            echo "TEMPLATES_PERF_HMR_ITERATIONS=${TEMPLATES_PERF_HMR_ITERATIONS}"
            echo "TEMPLATES_PERF_BUILD_ITERATIONS=${TEMPLATES_PERF_BUILD_ITERATIONS}"
            echo "TEMPLATES_PERF_HMR_FILTER=${TEMPLATES_PERF_HMR_FILTER}"
            echo "TEMPLATES_PERF_HMR_MAX_SCENARIOS_PER_TEMPLATE=${TEMPLATES_PERF_HMR_MAX_SCENARIOS_PER_TEMPLATE}"
            echo "TEMPLATES_PERF_HMR_PROFILE_TIMEOUT_MS=${TEMPLATES_PERF_HMR_PROFILE_TIMEOUT_MS}"
            echo "TEMPLATES_PERF_HMR_STARTUP_TIMEOUT_MS=${TEMPLATES_PERF_HMR_STARTUP_TIMEOUT_MS}"
            echo "TEMPLATES_PERF_HMR_SAMPLE_MODE=${TEMPLATES_PERF_HMR_SAMPLE_MODE}"
            echo "TEMPLATES_PERF_REPORT_DIR=${TEMPLATES_PERF_REPORT_DIR}"
          } >> "$GITHUB_ENV"

          {
            echo "### templates benchmark inputs"
            echo "- event: \`${EVENT_NAME}\`"
            echo "- benchmark: \`templates/*\`"
            echo "- HMR iterations: \`${TEMPLATES_PERF_HMR_ITERATIONS}\`"
            echo "- build iterations: \`${TEMPLATES_PERF_BUILD_ITERATIONS}\`"
            echo "- HMR filter: \`${TEMPLATES_PERF_HMR_FILTER:-all}\`"
            echo "- HMR max scenarios/template: \`${TEMPLATES_PERF_HMR_MAX_SCENARIOS_PER_TEMPLATE:-all}\`"
            echo "- HMR profile timeout: \`${TEMPLATES_PERF_HMR_PROFILE_TIMEOUT_MS}ms\`"
            echo "- HMR startup timeout: \`${TEMPLATES_PERF_HMR_STARTUP_TIMEOUT_MS}ms\`"
            echo "- HMR sample mode: \`${TEMPLATES_PERF_HMR_SAMPLE_MODE}\`"
            echo "- note: PR 默认覆盖所有模板，HMR 每模板最多取 6 个稳定代表场景，优先覆盖 JSON、样式、JS/TS、WXML/HTML 与 Vue；默认报告同一场景真实编辑/恢复循环中的快路径，手动触发可改为 edit-only 或调高迭代跑全量诊断"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run templates performance benchmark
        working-directory: head
        env:
          TEMPLATES_PERF_BASELINE_DIR: ${{ github.workspace }}/baseline
          TEMPLATES_PERF_OPTIMIZED_DIR: ${{ github.workspace }}/head
        run: pnpm exec tsx scripts/compare-templates-performance.ts

      - name: Upload templates performance report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: templates-performance-report-${{ matrix.os }}
          path: ${{ runner.temp }}/templates-performance-report
          if-no-files-found: warn
