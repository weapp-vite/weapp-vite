name: CI E2E IDE

on:
  workflow_dispatch:
    inputs:
      suite:
        description: IDE e2e suite to run on the self-hosted DevTools runner
        required: true
        default: ide-smoke
        type: choice
        options:
          - ide-smoke
          - ide-gate
          - ide-full
          - ide-full:github-issues
          - ide-full:wevu-features
          - ide-full:templates
      platform:
        description: Miniapp platform for the suite run
        required: true
        default: weapp
        type: choice
        options:
          - weapp
          - alipay
          - tt
      node-version:
        description: Node.js version for the self-hosted DevTools runner
        required: true
        default: '22'
        type: choice
        options:
          - '20'
          - '22'

permissions:
  contents: read

concurrency:
  group: ci-e2e-ide-${{ github.event.inputs.platform }}-${{ github.event.inputs['node-version'] || '22' }}
  cancel-in-progress: false

jobs:
  miniapp-e2e-ide:
    name: IDE E2E (${{ github.event.inputs.platform }} / Node ${{ github.event.inputs['node-version'] || '22' }} / ${{ github.event.inputs.suite }})
    timeout-minutes: 90
    runs-on:
      - self-hosted
      - macOS
      - wechat-devtools
    env:
      E2E_PLATFORM: ${{ github.event.inputs.platform }}

    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v5

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: ${{ github.event.inputs['node-version'] || '22' }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package artifacts for CLI e2e
        run: pnpm build:pkgs

      - name: Show available IDE suites
        run: pnpm e2e:config

      - name: Run IDE e2e suite
        run: node --import tsx ./e2e/scripts/run-e2e-suite.ts "${{ github.event.inputs.suite }}"
