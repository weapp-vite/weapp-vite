name: VSCode Extension CI

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'extensions/vscode/**'
      - .github/workflows/ci-vscode-extension.yml
      - .github/workflows/release.yml
      - .github/workflows/reusable-node-command.yml
      - '.github/actions/setup-node-pnpm/**'
      - '.github/actions/refresh-workspace-deps/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vscode-extension:
    name: VSCode Extension Checks (Node 24)
    uses: ./.github/workflows/reusable-node-command.yml
    with:
      runs_on: ubuntu-latest
      node_version: '24'
      timeout_minutes: 10
      main_command: |
        pnpm --dir extensions/vscode run check:publish
    secrets: inherit

  vscode-extension-package:
    name: VSCode Extension Package Dry Run (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - vscode-extension
      - vscode-extension-host-smoke
      - vscode-extension-vsix-e2e
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 24

      - name: Build VSIX dry run
        run: pnpm --dir extensions/vscode run package:dry-run

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vscode-extension-vsix
          path: extensions/vscode/.artifacts/*.vsix
          if-no-files-found: error
          include-hidden-files: true

  vscode-extension-host-smoke:
    name: VSCode Extension Host Smoke (Node 24)
    runs-on: macos-latest
    timeout-minutes: 15
    needs: vscode-extension
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 24

      - name: Build extension
        run: pnpm --dir extensions/vscode run build

      - name: Run VS Code host smoke test
        run: pnpm --dir extensions/vscode run test:host:smoke

  vscode-extension-vsix-e2e:
    name: VSCode Extension VSIX E2E (Node 24)
    runs-on: macos-latest
    timeout-minutes: 20
    needs: vscode-extension
    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/setup-node-pnpm
        with:
          node-version: 24

      - name: Run VSIX install-mode e2e
        run: pnpm --dir extensions/vscode run test:vsix:e2e
