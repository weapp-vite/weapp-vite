name: 🐞 Bug 反馈
description: 提交问题报告，帮助我们定位与修复
title: '[Bug]: '
labels: [bug]
assignees:
  - sonofmagic
body:
  - type: markdown
    attributes:
      value: |
        **提交前请先确认**

        这个表单只用于提交 Bug。

        如果你是使用问题、方案讨论，或还不确定是否属于缺陷，请优先使用 Discussions。

        提交前也请先搜索现有 issue。
        如果某个旧 issue 已关闭，但你在最新版本里仍能稳定复现，请重新开一个新 issue，而不是在旧 issue 下继续追加评论。
  - type: input
    id: version
    attributes:
      label: 版本号
    validations:
      required: true
  - type: input
    id: reproduction-link
    attributes:
      label: 最小复现链接
      description: |
        可以直接提供一个 GitHub 仓库链接。

        复现仓库应尽量 **最小化**，只保留触发问题所需的最少代码。

        请不要随意填写无关链接；如果没有有效复现，issue 可能会被关闭。
      placeholder: 复现仓库或最小复现链接
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: 复现步骤
      description: |
        在打开复现后，需要按什么步骤才能稳定触发问题？请尽量写清楚、写具体。
        你可以使用 Markdown 来组织列表和代码片段。
      placeholder: |
        1. 安装依赖
        2. 执行构建 / dev / e2e
        3. 打开某个页面或执行某段逻辑
        4. 观察报错
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actually-happening
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: system-info
    attributes:
      label: 环境信息
      description: 可粘贴 `npx -y envinfo@latest --system --npmPackages --binaries` 的输出
      render: shell
      placeholder: 系统、Node、pnpm、相关依赖版本等
  - type: textarea
    id: additional-comments
    attributes:
      label: 补充说明
      description: 例如背景信息、日志、截图、相关 issue 或你已经尝试过的排查手段。
