name: Refresh Workspace Dependencies
description: Build workspace artifacts consumed through injected package links, then refresh installs.

inputs:
  build-command:
    description: Command used to build workspace artifacts before reinstalling
    required: true

runs:
  using: composite
  steps:
    - name: Build workspace artifacts
      shell: bash
      run: ${{ inputs.build-command }}

    - name: Refresh injected workspace dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
